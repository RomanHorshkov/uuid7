name: Quality

# Connected graph, not three independent workflows racing each other on every push:
#
#   build-libs
#     +-- it (integration tests + coverage, across every build profile incl. sanitize/tsan)
#     +-- stress (heavy benchmarks, informational — not a hard gate for package-smoke)
#   it -> package-smoke
#
# Also invocable as a reusable workflow (workflow_call) so release.yml can require it to pass
# before cutting a release, instead of re-implementing the same gate.

on:
  push:
    # Tag pushes are release cuts: release.yml's quality-gate job already invokes THIS
    # file via workflow_call for that exact ref. Without this exclusion a tag push fires
    # Quality twice — once directly, once nested inside Release — and both instances
    # share the same concurrency group below (workflow name + ref), so cancel-in-progress
    # kills whichever started second. That silently starves release.yml's quality-gate
    # dependency, and Build release assets skips with a bare "failure", no readable error.
    tags-ignore:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-libs:
    name: Build libraries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
      - name: Build static and shared libraries
        run: ./utils/build_libs.sh
      - name: Upload library build artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: library-build
          if-no-files-found: error
          path: |
            build/*/libuuid7.a
            build/*/libuuid7.so*
            build/libuuid7.a
            build/libuuid7.so*

  it:
    name: Integration tests + coverage (all profiles, incl. sanitize/tsan)
    needs: build-libs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libcmocka-dev gcovr
      - name: Build integration tests
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh build_ITs
      - name: Run integration tests
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh run_ITs
      - name: Upload integration pipeline report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: integration-pipeline-report
          if-no-files-found: warn
          path: tests/results/pipeline/runs/**
      - name: Upload IT coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: it-coverage
          if-no-files-found: warn
          path: tests/results/pipeline/runs/**/coverage/**

  coverage-badge:
    name: Update coverage badge
    needs: it
    # Only on a real push to a branch we own (not PRs — a fork's PR can't push
    # back, and forked-repo runs shouldn't try). The badge is read from README.md
    # via a raw-content shields.io endpoint, so it only needs to reflect whatever
    # branch was just pushed.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: it-coverage
          path: it-coverage
      - name: Compute badge color + write endpoint JSON
        run: |
          SUMMARY="$(find it-coverage -name 'coverage-summary.json' -path '*release*' | head -1)"
          if [[ -z "${SUMMARY}" ]]; then
            echo "no coverage-summary.json in the it-coverage artifact" >&2
            exit 1
          fi
          python3 utils/write_coverage_badge.py "${SUMMARY}" .github/badges/coverage.json
      - name: Commit badge if it changed
        run: |
          if git diff --quiet -- .github/badges/coverage.json; then
            echo "coverage unchanged, nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json
          # [skip ci]: this commit must not itself trigger another Quality run.
          git commit -m "ci: update coverage badge [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  stress:
    name: Stress benchmarks
    needs: build-libs
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Build stress benchmarks
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-stress"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh build_stress
      - name: Run stress benchmarks
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-stress"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh run_stress
      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stress-results
          if-no-files-found: warn
          path: tests/results/pipeline/runs/**

  package-smoke:
    name: Package build + install + smoke test
    needs: it
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config fakeroot
      - name: Build .deb
        run: ./utils/build_deb.sh
      - name: Install the built .deb
        run: |
          DEB_FILE="$(find build/debs -maxdepth 1 -name '*.deb' -print -quit)"
          if [[ -z "${DEB_FILE}" ]]; then
            echo "no .deb found under build/debs/" >&2
            exit 1
          fi
          # apt-get only treats an argument as a local file path if it starts with ./ or /;
          # a bare relative path like "build/debs/foo.deb" (even though it contains slashes)
          # is parsed as a REPOSITORY PACKAGE NAME instead and fails with a confusing
          # "Unable to locate package build/debs" error.
          sudo apt-get install -y "./${DEB_FILE}"
      - name: Smoke test the installed package
        run: ./utils/smoke_test_package.sh
      - name: Upload .deb artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deb-package
          if-no-files-found: error
          path: build/debs/*.deb
