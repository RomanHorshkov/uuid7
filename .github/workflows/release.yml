name: Release

# Full reusable Quality gate must pass before anything is published — previously this workflow
# built and released directly with no dependency on the test suite at all. Fires on a v* tag
# push; validates the tag matches VERSION, builds the release bundle (tarball + .deb), attaches
# a build-provenance attestation, and creates the GitHub Release.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release mid-flight

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality.yml

  build-release-assets:
    name: Build release assets
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write       # create the GitHub release
      id-token: write       # OIDC for build provenance attestation
      attestations: write   # attach the attestation to this repo
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config fakeroot

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          EXPECTED_TAG="v${{ steps.version.outputs.value }}"
          ACTUAL_TAG="${GITHUB_REF_NAME}"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch: expected $EXPECTED_TAG but got $ACTUAL_TAG"
            exit 1
          fi

      - name: Build libraries
        run: ./utils/build_libs.sh release

      - name: Build Debian package
        run: ./utils/build_deb.sh

      - name: Assemble release bundle
        run: |
          VER="${{ steps.version.outputs.value }}"
          STAGE_DIR="build/release-stage/uuid7-${VER}"
          BUNDLE_DIR="build/release-bundle"
          mkdir -p "${STAGE_DIR}/include" "${STAGE_DIR}/lib" "${BUNDLE_DIR}"

          cp app/uuid7.h "${STAGE_DIR}/include/"
          cp build/release/libuuid7.a "${STAGE_DIR}/lib/"
          cp build/release/libuuid7.so."${VER}" "${STAGE_DIR}/lib/"
          ln -sf "libuuid7.so.${VER}" "${STAGE_DIR}/lib/libuuid7.so"

          tar -C "build/release-stage" -czf \
            "${BUNDLE_DIR}/uuid7-${VER}-linux-x86_64.tar.gz" \
            "uuid7-${VER}"

          cp build/debs/*.deb "${BUNDLE_DIR}/"

          (
            cd "${BUNDLE_DIR}"
            sha256sum * > SHA256SUMS
          )

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v2.2.3
        with:
          subject-path: build/release-bundle/*

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-assets
          if-no-files-found: error
          path: |
            build/release-bundle/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/release-bundle/* \
            --generate-notes \
            --title "UUID7 ${GITHUB_REF_NAME}"
