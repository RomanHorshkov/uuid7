name: build-and-tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-libs:
    name: Build libraries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build static and shared libraries
        run: |
          ./utils/make_libs.sh

      - name: Upload library build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: library-build
          if-no-files-found: error
          path: |
            build/libuuid7.a
            build/libuuid7.so.*

  it:
    name: Integration tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-libs
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libcmocka-dev gcovr

      - name: Build + run integration test
        run: |
          ./utils/make_ITs.sh

      - name: Upload integration result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-result
          if-no-files-found: warn
          path: |
            tests/results/ITs/integration_result.txt

      - name: Upload IT coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: it-coverage
          if-no-files-found: warn
          path: |
            tests/results/ITs/ITs_all_coverage.html
            tests/results/ITs/ITs_all_coverage.xml
            tests/results/ITs/coverage-summary.json

  stress:
    name: Stress benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-libs
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build + run stress benchmarks
        run: |
          ./utils/make_stress.sh

      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results
          if-no-files-found: warn
          path: |
            tests/results/stress/stress_result.txt
            tests/results/stress/stress_mt_result.txt
