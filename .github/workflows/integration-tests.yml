name: build-and-tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-libs:
    name: Build libraries
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build static and shared libraries
        run: |
          ./utils/build_libs.sh

      - name: Upload library build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: library-build
          if-no-files-found: error
          path: |
            build/*/libuuid7.a
            build/*/libuuid7.so*
            build/libuuid7.a
            build/libuuid7.so*

  it:
    name: Integration tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - build-libs
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libcmocka-dev gcovr

      - name: Build integration tests
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh build_ITs

      - name: Run integration tests
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh run_ITs

      - name: Upload integration pipeline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-pipeline-report
          if-no-files-found: warn
          path: |
            tests/results/pipeline/runs/**

      - name: Upload IT coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: it-coverage
          if-no-files-found: warn
          path: |
            tests/results/pipeline/runs/**/coverage/**

  stress:
    name: Stress benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs:
      - build-libs
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build stress benchmarks
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-stress"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh build_stress

      - name: Run stress benchmarks
        run: |
          RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-stress"
          UUID7_RESULTS_RUN_ID="${RUN_ID}" ./utils/run_pipeline.sh run_stress

      - name: Upload stress results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results
          if-no-files-found: warn
          path: |
            tests/results/pipeline/runs/**
