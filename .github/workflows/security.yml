name: Security

# CodeQL + GCC's static analyzer (-fanalyzer), on push/PR (CodeQL is diff-aware and most useful
# there) plus a weekly scheduled run so drift in dependencies/toolchains still gets caught even
# without a code change. Minimal permissions throughout — only the CodeQL upload step needs
# security-events: write. uuid7 had no Security workflow at all before this.

on:
  push:
    branches: [reorganization, main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.0
        with:
          languages: c-cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Build (CodeQL autobuild)
        run: ./utils/build_libs.sh release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@f09c1c0a94de965c15400f5634aa42fac8fb8f88 # v3.27.0

  compiler-analyzer:
    name: GCC static analyzer (-fanalyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config

      - name: Run GCC's static analyzer over the library source
        run: |
          gcc -std=c11 -Wall -Wextra -fanalyzer -Iapp -c app/uuid7.c -o /tmp/uuid7_analyzer.o
